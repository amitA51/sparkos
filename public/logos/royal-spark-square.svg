<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fcf6ba" />
            <stop offset="20%" stop-color="#bf953f" />
            <stop offset="40%" stop-color="#b38728" />
            <stop offset="60%" stop-color="#fbf5b7" />
            <stop offset="80%" stop-color="#aa771c" />
        </linearGradient>
        <radialGradient id="bgGrad" cx="50%" cy="100%" r="100%">
            <stop offset="0%" stop-color="#222" />
            <stop offset="100%" stop-color="#000" />
        </radialGradient>
        <filter id="goldGlow">
            <feGaussianBlur stdDeviation="2" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Square Container (App Icon Shape) -->
    <rect x="0" y="0" width="100" height="100" rx="22" fill="url(#bgGrad)" />
    <rect x="0" y="0" width="100" height="100" rx="22" fill="none" stroke="rgba(212, 175, 55, 0.2)" stroke-width="0.5" />
    
    <!-- 8 Point Spark -->
    <g transform="translate(0, 0)"> <!-- Centered already in 100x100 viewBox -->
        <path d="M50 15 L58 38 L85 45 L62 58 L55 85 L44 60 L15 50 L40 40 Z" fill="url(#goldGrad)"
            style="filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.5))" />
        <!-- Adjusted points slightly to fit better in square padding if needed, but original coordinates were:
             M50 10 L60 40 L90 50 L60 60 L50 90 L40 60 L10 50 L40 40 Z 
             Let's use the original coordinates as they were good, just maybe scale down slightly to not hit edges?
             Original margin was 10. That's fine.
        -->
        <path d="M50 15 L60 40 L85 50 L60 60 L50 85 L40 60 L15 50 L40 40 Z" fill="url(#goldGrad)"
              style="filter: drop-shadow(0 0 4px rgba(255, 215, 0, 0.5))" />
        <circle cx="50" cy="50" r="4" fill="#fff" opacity="0.9" />
    </g>
</svg>
