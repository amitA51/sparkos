<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#00F0FF" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="#0A0A0F" rx="40" />

  <!-- Center Node -->
  <circle cx="100" cy="100" r="20" fill="url(#grad3)" />
  
  <!-- Radiating Lines -->
  <g stroke="#00F0FF" stroke-width="4" stroke-linecap="round">
    <line x1="100" y1="100" x2="160" y2="100" transform="rotate(0 100 100)" />
    <line x1="100" y1="100" x2="160" y2="100" transform="rotate(45 100 100)" />
    <line x1="100" y1="100" x2="160" y2="100" transform="rotate(90 100 100)" />
    <line x1="100" y1="100" x2="160" y2="100" transform="rotate(135 100 100)" />
    <line x1="100" y1="100" x2="160" y2="100" transform="rotate(180 100 100)" />
    <line x1="100" y1="100" x2="160" y2="100" transform="rotate(225 100 100)" />
    <line x1="100" y1="100" x2="160" y2="100" transform="rotate(270 100 100)" />
    <line x1="100" y1="100" x2="160" y2="100" transform="rotate(315 100 100)" />
  </g>
  
  <g fill="#7B61FF">
    <circle cx="165" cy="100" r="6" transform="rotate(0 100 100)" />
    <circle cx="165" cy="100" r="6" transform="rotate(45 100 100)" />
    <circle cx="165" cy="100" r="6" transform="rotate(90 100 100)" />
    <circle cx="165" cy="100" r="6" transform="rotate(135 100 100)" />
    <circle cx="165" cy="100" r="6" transform="rotate(180 100 100)" />
    <circle cx="165" cy="100" r="6" transform="rotate(225 100 100)" />
    <circle cx="165" cy="100" r="6" transform="rotate(270 100 100)" />
    <circle cx="165" cy="100" r="6" transform="rotate(315 100 100)" />
  </g>
</svg>
