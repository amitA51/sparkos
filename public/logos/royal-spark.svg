<svg width="100%" height="100%" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fcf6ba" />
            <stop offset="20%" stop-color="#bf953f" />
            <stop offset="40%" stop-color="#b38728" />
            <stop offset="60%" stop-color="#fbf5b7" />
            <stop offset="80%" stop-color="#aa771c" />
        </linearGradient>
        <filter id="goldGlow">
            <feGaussianBlur stdDeviation="2" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    <!-- 8 Point Spark -->
    <path d="M50 10 L60 40 L90 50 L60 60 L50 90 L40 60 L10 50 L40 40 Z" fill="url(#goldGrad)"
        style="filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.5))" />
    <circle cx="50" cy="50" r="5" fill="#fff" opacity="0.8" />
